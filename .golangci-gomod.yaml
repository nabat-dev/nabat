# go.mod supply-chain / directive hygiene. Used by CI via `nix run .#lint-gomod`
# (not merged into the main golangci config so local runs stay focused on Go source).
version: "2"

linters:
  enable:
    - gomoddirectives

  settings:
    gomoddirectives:
      # Forbid unexplained local-only replace directives (override with replace-allow-list if needed).
      replace-local: false
      retract-allow-no-explanation: false
      # Validate module path format when enabled.
      check-module-path: true

run:
  timeout: 2m
